name: Make Package Public
on: workflow_dispatch
permissions:
  packages: write
jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and re-push
        run: |
          docker pull ghcr.io/ansvar-systems/austrian-law-mcp:latest
          docker push ghcr.io/ansvar-systems/austrian-law-mcp:latest
